<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8826 Palmetto Falls - Virtual Tour</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-light: #64748b;
            --header-bg: rgba(255, 255, 255, 0.95);
            --accent: #0f766e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Hero Video Section */
        .hero {
            position: relative;
            height: 80vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .hero video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            opacity: 0.7;
            pointer-events: none;
        }

        .hero-overlay {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .hero-overlay h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .hero-overlay p {
            font-size: 1.25rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container & Sections */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        section {
            margin-bottom: 4rem;
            scroll-margin-top: 80px; /* Accounts for sticky header */
        }

        /* Sticky Section Headers */
        .sticky-header {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 1rem 0;
            margin-bottom: 1.5rem;
            z-index: 10;
            font-size: 1.75rem;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
            color: var(--accent);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px -6px rgba(0,0,0,0.1);
        }

        /* CSS Grid for Images */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            aspect-ratio: 4 / 3;
            background: #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox (Full Screen Modal) */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            user-select: none;
        }

        /* Lightbox Controls */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 1001;
        }

        .close-btn:hover { color: #cbd5e1; }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            font-weight: 300;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            border: none;
            padding: 20px 15px;
            transition: background 0.2s;
            border-radius: 8px;
            z-index: 1001;
        }

        .nav-btn:hover { background: rgba(0,0,0,0.8); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .lightbox-counter {
            position: absolute;
            bottom: 20px;
            color: #94a3b8;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-overlay h1 { font-size: 2.25rem; }
            .hero-overlay p { font-size: 1rem; }
            .container { padding: 1rem; }
            .gallery-grid { grid-template-columns: 1fr; gap: 1rem; }
            .nav-btn { padding: 10px 5px; font-size: 30px; }
            .close-btn { top: 10px; right: 20px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay loop muted playsinline>
            <source src="Video_Generation_Walking_Up_To_Door.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay">
            <h1>8826 Palmetto Falls</h1>
            <p>San Antonio, TX</p>
        </div>
    </header>

    <div class="container">
        
        <section id="arrival">
            <h2 class="sticky-header">The Arrival</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="front-entry-1.jpg" alt="Front Entry 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="front-entry-2.jpg" alt="Front Entry 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="front-entry-3.jpg" alt="Front Entry 3" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="front-entry-4.jpg" alt="Front Entry 4" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="inside">
            <h2 class="sticky-header">Stepping Inside</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="entry-1.jpg" alt="Entry 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="entry-2.jpg" alt="Entry 2" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="living">
            <h2 class="sticky-header">Living & Dining</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="living-room-1.jpg" alt="Living Room 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="living-room-2.jpg" alt="Living Room 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="living-room-3.jpg" alt="Living Room 3" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="living-room-4.jpg" alt="Living Room 4" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="living-room-5.jpg" alt="Living Room 5" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="dining-1.jpg" alt="Dining 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="dining-2.jpg" alt="Dining 2" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="kitchen">
            <h2 class="sticky-header">The Kitchen</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="kitchen-1.jpg" alt="Kitchen 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="Kitchen-2.jpg" alt="Kitchen 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="kitchen-3.jpg" alt="Kitchen 3" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="kitchen-4.jpg" alt="Kitchen 4" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="primary-suite">
            <h2 class="sticky-header">The Primary Suite</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="primary-1.jpg" alt="Primary Bedroom 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-2.jpg" alt="Primary Bedroom 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-3.jpg" alt="Primary Bedroom 3" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-4.jpg" alt="Primary Bedroom 4" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-bath-1.jpg" alt="Primary Bath 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-bath-2.jpg" alt="Primary Bath 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="primary-closet.jpg" alt="Primary Closet" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="secondary">
            <h2 class="sticky-header">Bedrooms & Playroom</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="bed-2.jpg" alt="Bedroom 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="bed-3.jpg" alt="Bedroom 3" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="playroom-1.jpg" alt="Playroom 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="playroom-2.jpg" alt="Playroom 2" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="utilities">
            <h2 class="sticky-header">Bathrooms & Laundry</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="downstairs-bath.jpg" alt="Downstairs Bath" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="upstairs-bath.jpg" alt="Upstairs Bath" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="laundry.jpg" alt="Laundry Room" class="lightbox-trigger"></div>
            </div>
        </section>

        <section id="outdoor">
            <h2 class="sticky-header">Outdoor Living</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="patio-1.jpg" alt="Patio 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="patio-2.jpg" alt="Patio 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="back-yard-1.jpg" alt="Backyard 1" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="back-yard-2.jpg" alt="Backyard 2" class="lightbox-trigger"></div>
                <div class="gallery-item"><img src="back-yard-3.jpg" alt="Backyard 3" class="lightbox-trigger"></div>
            </div>
        </section>

    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="lightbox-main-img" class="lightbox-img" src="" alt="Full Screen Image">
        <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
        <div id="lightbox-counter" class="lightbox-counter"></div>
    </div>

    <script>
        // Lightbox Logic
        let currentImageIndex = 0;
        let images = [];

        // Initialize gallery on load
        window.onload = () => {
            const imageElements = document.querySelectorAll('.lightbox-trigger');
            
            // Build an array of image sources
            imageElements.forEach((img, index) => {
                images.push(img.src);
                // Add click listener to open lightbox
                img.addEventListener('click', () => openLightbox(index));
            });
        };

        function openLightbox(index) {
            currentImageIndex = index;
            updateLightboxContent();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            
            // Loop back to start/end
            if (currentImageIndex >= images.length) {
                currentImageIndex = 0;
            } else if (currentImageIndex < 0) {
                currentImageIndex = images.length - 1;
            }
            
            updateLightboxContent();
        }

        function updateLightboxContent() {
            const lightboxImg = document.getElementById('lightbox-main-img');
            const counter = document.getElementById('lightbox-counter');
            
            lightboxImg.src = images[currentImageIndex];
            counter.innerText = `${currentImageIndex + 1} / ${images.length}`;
        }

        // Keyboard navigation (Esc to close, Left/Right arrows to navigate)
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
            }
        });

        // Close when clicking outside the image
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
